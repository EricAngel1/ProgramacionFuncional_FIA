<!DOCTYPE html>
<html>

<head>
    <title>Robot DaVinci</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&family=Changa:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
</head>
<style>
    body {
        margin: 0;
        background-color: #11100E;
        color: white;
        font-family: 'Montserrat', sans-serif;
    }

    .Padre {
        background-image: url(/fondo.png);
        background-repeat: no-repeat;
    }

    .Header {
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        font-size: 36px;
        font-weight: 800;
        margin-bottom: 20px;
    }

    .Header img {
        position: absolute;
        left: 50px;
    }

    .Barra {
        display: flex;
        justify-content: center;
    }

    .BarraConte {
        display: flex;
        justify-content: space-around;
        align-items: center;
        background-color: rgba(151, 151, 151, 0.086);
        backdrop-filter: blur(23px);
        border-radius: 53px;
        font-size: 24px;
        font-weight: 700;
        width: 1404px;
        margin-bottom: 30px;
        color: rgb(255, 255, 255);
    }

    .HijoContenido {
        display: grid;
        grid-template-columns: repeat(2, 664px);
        justify-content: center;
        align-items: center;
        gap: 30px;
    }

    .HijoContenido div {
        background-color: #6a6a6a14;
        backdrop-filter: blur(23px);
        width: 664px;
        height: 427px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border-radius: 23px;
    }

    .HijoContenido form {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        font-size: 24px;
        font-weight: 700;
    }

    .HijoContenido input {
        width: 423px;
        height: 58px;
        border-radius: 22px;
        border: 2px solid #ffffff37;
        background-color: transparent;
        padding-left: 20px;
        padding-right: 20px;
        color: rgb(255, 255, 255);
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 20px;
    }

    .HijoContenido input:focus {
        outline: none;
    }

    .HijoContenido button {
        width: 423px;
        height: 58px;
        background-color: white;
        color: black;
        border-radius: 20px;
        font-weight: 800;
        font-size: 20px;
        margin-top: 20px;
        cursor: pointer;
    }

    .HijoContenido button:hover {
        transform: scale(1.03);
    }

    .HijoContenido p {
        margin: 0;
        margin-bottom: 20px;
    }

    .ContenedorListar button {
        margin-top: 150px;
    }

    .ContenedorOrdenar button {
        margin-top: 150px;
    }

    .ContenedorLogitud button {
        margin-top: 150px;
    }
</style>

<body>
    <div class="Padre">
        <div class="Header">
            <img src="/udg.png" alt="">
            <p>GESTOR DE CONSULTAS DEL ROBOT DAVINCI</p>
        </div>
        <div class="Barra">
            <div class="BarraConte">
                <p>LISTAS: </p>
                <p>robothw</p>
                <p>robotsw</p>
                <p>versiones</p>
                <p>evapreoperacion</p>
                <p>modulointeligente</p>
                <p>operacion</p>
            </div>
        </div>
        <div class="HijoContenido">
            <div class="ContenedorBuscar">
                <form action="/buscar" method="GET">
                    <p>LISTA</p>
                    <input type="text" name="lista" placeholder="INGRESE NOMBRE DE LISTA..." required><br>
                    <p>ELEMENTO</p>
                    <input type="text" name="elemento" placeholder="INGRESE NOMBRE DEL ELEMENTO..." required><br>
                    <button type="submit">
                        BUSCAR
                    </button>
                </form>
            </div>
            <div class="ContenedorListar">
                <form action="/listar" method="get">
                    <p>COMPROBAR LISTAS</p>
                    <input type="text" name="lista" placeholder="INGRESE NOMBRE DE LISTA..." required><br>
                    <button type="submit">
                        LISTAR
                    </button>
                </form>
            </div>
            <div class="ContenedorADD">
                <form action="/agregar_ejecutar" method="GET">
                    <p>LISTA</p>
                    <input type="text" name="lista" placeholder="INGRESE NOMBRE DE LISTA..." required><br>
                    <p>ELEMENTO</p>
                    <input type="text" name="elemento" placeholder="INGRESE NOMBRE DEL ELEMENTO..." required><br>
                    <button type="submit">
                        AGREGAR
                    </button>
                </form>
            </div>
            <div class="ContenedorEliminar">
                <form action="/eliminar_ejecutar" method="GET">
                    <p>LISTA</p>
                    <input type="text" name="lista" placeholder="INGRESE NOMBRE DE LISTA..." required><br>
                    <p>ELEMENTO</p>
                    <input type="text" name="elemento" placeholder="INGRESE NOMBRE DEL ELEMENTO..." required><br>
                    <button type="submit">
                        ELIMINAR
                    </button>
                </form>
            </div>
            <div class="ContenedorOrdenar">
                <form action="/ordenar" method="get">
                    <p>ORDENAR LISTA</p>
                    <input type="text" name="lista" placeholder="INGRESE NOMBRE DE LISTA..." required><br>
                    <button type="submit">
                        ORDENAR (SORT)
                    </button>
                </form>
            </div>
            <div class="ContenedorConca">
                <form action="concatenar" method="get">
                    <p>PRIMERA LISTA</p>
                    <input type="text" name="lista1" placeholder="INGRESE NOMBRE DE LISTA..." required><br>
                    <p>SEGUNDA LISTA</p>
                    <input type="text" name="lista2" placeholder="INGRESE NOMBRE DE LISTA..." required><br>
                    <button type="submit">
                        CONCATENAR
                    </button>
                </form>
            </div>
            <div class="ContenedorLogitud">
                <form action="/longitud" method="get">
                    <p>CALCULAR LONGITUD</p>
                    <input type="text" name="lista" placeholder="INGRESE NOMBRE DE LISTA..." required><br>
                    <button type="submit">
                        CALCULAR
                    </button>
                </form>
            </div>
        </div>
    </div>

</body>

</html>
