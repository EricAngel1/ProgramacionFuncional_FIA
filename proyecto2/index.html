<!DOCTYPE html>
<html>

<head>
    <title>Robot DaVinci Simple</title>
</head>

<body>
    <h2>Buscador de la Base de Conocimiento</h2>

    <form action="/buscar" method="GET">
        <label>Nombre de la Lista:</label><br>
        <input type="text" name="lista" placeholder="ej: robotsw" required><br><br>

        <label>Elemento a buscar:</label><br>
        <input type="text" name="elemento" placeholder="ej: simulacion" required><br><br>

        <button type="submit">Consultar</button>
    </form>
    <div class="box">
        <h3>📋 Listar Elementos</h3>
        <form action="/listar" method="GET">
            <input type="text" name="lista" placeholder="Lista a mostrar (ej: operacion)" required><br>
            <button type="submit" style="background: #28a745;">Ver Contenido Completo</button>
        </form>
    </div>
</body>

</html>
